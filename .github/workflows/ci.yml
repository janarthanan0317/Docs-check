name: TigerGate Security

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

env:
  TIGERGATE_API_KEY: ${{ secrets.TIGERGATE_API_KEY }}
  # Uncomment if your production environment requires it
  # TIGERGATE_API_URL: https://api.tigergate.dev/api/ci

jobs:
  pr-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      statuses: write

    container:
      image: tigergate/tigergate-cli:lastest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TigerGate PR Scan
        run: |
          tigergate scan \
            --type all \
            --scan-scope diff \
            --upload

  full-scan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    container:
      image: tigergate/tigergate-cli:lastest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TigerGate Full Scan
        run: |
          tigergate scan \
            --type all \
            --scan-scope full \
            --upload